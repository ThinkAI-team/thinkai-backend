# ==============================================================================
# ThinkAI Backend - Profile LOCAL (Docker MySQL)
# ==============================================================================
# Mục đích: Dev tự do test, phá data, Hibernate tự tạo/sửa bảng
# Kích hoạt: Mặc định (không cần truyền gì)
# ==============================================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/thinkai_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
