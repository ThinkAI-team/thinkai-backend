# ==============================================================================
# ThinkAI Backend - Profile LOCAL (YAML Format)
# ==============================================================================
gemini:
  api:
    key: "AIzaSyClSWxLMC0bBWyJgcifeP2YMF5wMEH4ItM"
    url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent"

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/thinkai_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect